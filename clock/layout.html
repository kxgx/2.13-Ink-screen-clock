<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>墨水屏时钟 · 布局控制</title>
<style>
:root {
  --bg: #1a1a2e; --card: #16213e; --accent: #0f3460;
  --hl: #e94560; --ok: #00b894; --warn: #fdcb6e;
  --text: #dfe6e9; --muted: #636e72; --input-bg: #0a0f1a;
}
* { margin:0; padding:0; box-sizing:border-box; }
body { font:14px/1.5 system-ui,sans-serif; background:var(--bg); color:var(--text); min-height:100vh; }
header { background:var(--card); padding:12px 24px; display:flex; align-items:center; justify-content:space-between; border-bottom:2px solid var(--accent); position:sticky; top:0; z-index:10; }
header h1 { font-size:18px; }
.status { display:flex; gap:12px; align-items:center; flex-wrap:wrap; }
.badge { padding:4px 12px; border-radius:12px; font-size:12px; font-weight:600; }
.badge.active { background:var(--ok); color:#000; }
.badge.pending { background:var(--warn); color:#000; animation:pulse 1s infinite; }
.badge.off { background:var(--muted); color:#fff; }
.badge.err { background:var(--hl); color:#fff; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.6} }
.main { display:grid; grid-template-columns:280px 1fr; gap:16px; padding:16px; max-width:1100px; margin:0 auto; }
.preview-panel { background:var(--card); border-radius:12px; padding:16px; position:sticky; top:68px; height:fit-content; }
.preview-panel h2 { font-size:14px; color:var(--muted); margin-bottom:12px; }
canvas { display:block; border-radius:2px; background:#e8e4dc; margin:0 auto; }
.scr-wrap { position:relative; display:block; line-height:0; border-radius:2px; width:100%; max-width:500px; margin:0 auto; }
.scr-wrap canvas { display:block; width:100%; height:auto; aspect-ratio:250/122; image-rendering:pixelated; }
#drag-layer { position:absolute; inset:0; z-index:3; background:transparent; cursor:crosshair; }
.scr-texture {
  position:absolute; inset:0; pointer-events:none; z-index:1; border-radius:2px;
  opacity:0.30; mix-blend-mode:multiply;
  background-image:url("data:image/svg+xml,%3Csvg width='100' height='100' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='t'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100' height='100' filter='url(%23t)' opacity='0.3'/%3E%3C/svg%3E");
  background-size:80px 80px;
}
.scr-reflect {
  position:absolute; inset:0; pointer-events:none; z-index:2; border-radius:2px;
  background:linear-gradient(155deg,rgba(255,255,255,0.07) 0%,rgba(255,255,255,0.02) 20%,transparent 45%,rgba(0,0,0,0.04) 75%,rgba(0,0,0,0.08) 100%);
}
.preview-info { margin-top:12px; font-size:12px; }
.preview-info .row { display:flex; justify-content:space-between; padding:3px 0; }
.preview-info .row span:first-child { color:var(--muted); }
.preview-info .row span:last-child { max-width:180px; text-align:right; word-break:break-all; }
.controls { display:flex; flex-direction:column; gap:16px; }
.group { background:var(--card); border-radius:12px; overflow:hidden; }
.group-head { padding:14px 16px; cursor:pointer; display:flex; align-items:center; justify-content:space-between; user-select:none; border-bottom:1px solid transparent; transition:border-color .2s; }
.group-head:hover { background:#1b2a40; }
.group.open .group-head { border-bottom-color:var(--accent); }
.group-head h3 { font-size:14px; }
.group-head .icon { transition:transform .2s; font-size:12px; }
.group.open .group-head .icon { transform:rotate(180deg); }
.group-body { display:none; padding:16px; }
.group.open .group-body { display:grid; grid-template-columns:1fr 1fr; gap:10px; }
.field { display:flex; flex-direction:column; gap:4px; }
.field label { font-size:11px; color:var(--muted); text-transform:uppercase; letter-spacing:.5px; }
.field input { width:100%; padding:7px 10px; background:var(--input-bg); border:1px solid var(--accent); border-radius:6px; color:var(--text); font-size:13px; }
.field input:focus { outline:none; border-color:var(--hl); }
.field input.modified { border-color:var(--warn); }
.field select { width:100%; padding:7px 10px; background:var(--input-bg); border:1px solid var(--accent); border-radius:6px; color:var(--text); font-size:13px; cursor:pointer; }
.field select:focus { outline:none; border-color:var(--hl); }
.field select.modified { border-color:var(--warn); }
.actions { display:flex; gap:10px; padding:16px; background:var(--card); border-radius:12px; position:sticky; bottom:0; }
.actions button { flex:1; padding:12px 0; border:none; border-radius:8px; font-size:14px; font-weight:600; cursor:pointer; transition:filter .2s; }
.actions button:hover { filter:brightness(1.15); }
.actions button:active { filter:brightness(.9); }
.btn-preview { background:var(--accent); color:var(--text); }
.btn-apply  { background:var(--ok); color:#000; }
.btn-cancel { background:var(--hl); color:#fff; }
.btn-refresh { background:var(--muted); color:#fff; }
.conn { padding:4px 8px; border-radius:4px; background:var(--input-bg); font-size:12px; display:flex; align-items:center; gap:6px; }
.conn input { background:transparent; border:none; color:var(--text); width:140px; font-size:12px; }
.conn input:focus { outline:none; }
.dot { width:8px; height:8px; border-radius:50%; }
.dot.on  { background:var(--ok); }
.dot.off { background:var(--hl); }
.err-msg { font-size:12px; color:var(--hl); margin-top:8px; display:none; }
.err-msg.show { display:block; }
.upload-zone { border:2px dashed var(--accent); border-radius:8px; padding:16px; text-align:center; cursor:pointer; transition:border-color .2s,background .2s; margin-top:8px; }
.upload-zone:hover, .upload-zone.dragover { border-color:var(--ok); background:rgba(0,184,148,0.08); }
.upload-zone input[type=file] { display:none; }
.upload-zone .up-icon { font-size:24px; margin-bottom:4px; }
.upload-zone .up-text { font-size:12px; color:var(--muted); }
.upload-status { font-size:11px; margin-top:4px; text-align:center; }
.upload-status.ok { color:var(--ok); }
.upload-status.err { color:var(--hl); }
.auto-refresh { display:flex; align-items:center; gap:2px; font-size:12px; color:var(--muted); cursor:pointer; user-select:none; }
.auto-refresh input[type=checkbox] { accent-color:var(--ok); cursor:pointer; }
.pos-table { width:100%; border-collapse:collapse; font:11px/1.4 monospace; margin-top:8px; }
.pos-table th,.pos-table td { padding:2px 4px; text-align:right; }
.pos-table th { color:var(--muted); font-weight:400; font-size:10px; border-bottom:1px solid var(--accent); }
.pos-table th:first-child,.pos-table td:first-child { text-align:left; color:var(--muted); }
.pos-table td { color:var(--ok); }
.pos-table td.mod { color:var(--warn); }

@font-face {
  font-family:'DSEG';
  src:url('/pic/DSEG7Modern-Bold.ttf') format('truetype');
}

@media (max-width:768px) {
  .main { grid-template-columns:1fr; }
  .preview-panel { position:static; }
}
@media (min-width:1200px) {
  .scr-wrap { --s:3; }
}
</style>
</head>
<body>

<header>
  <h1>墨水屏时钟 · 布局控制</h1>
  <div class="status">
    <div class="conn">
      <div class="dot" id="conn-dot"></div>
      <input id="api-host" value="192.168.2.103:8080" placeholder="host:port">
    </div>
    <span class="badge" id="pending-badge">--</span>
    <span class="badge" id="conn-badge">--</span>
    <label class="auto-refresh" id="ar-label" title="自动刷新预览">
      <input type="checkbox" id="ar-toggle" onchange="toggleAutoRefresh()"> 自动刷新
      <select id="ar-interval" onchange="changeInterval()" style="margin-left:4px;background:var(--input-bg);border:1px solid var(--accent);color:var(--text);font-size:11px;padding:2px 4px;border-radius:4px;">
        <option value="3" selected>3s</option>
        <option value="10">10s</option>
        <option value="30">30s</option>
        <option value="60">60s</option>
      </select>
    </label>
  </div>
</header>

<div class="main">
  <div class="preview-panel">
    <h2>屏幕预览 250×122</h2>
    <div class="scr-wrap">
      <canvas id="preview" width="250" height="122"></canvas>
      <canvas id="drag-layer" width="250" height="122"></canvas>
      <div class="scr-texture"></div>
      <div class="scr-reflect"></div>
    </div>
    <div class="err-msg" id="err-msg"></div>
    <div class="preview-info" id="info"></div>
    <table class="pos-table" id="pos-table"><thead><tr><th>元素</th><th>X</th><th>Y</th></tr></thead><tbody></tbody></table>
  </div>
  <div class="controls" id="controls"></div>
</div>

<div class="actions">
  <button class="btn-refresh" onclick="fetchLayout()">刷新</button>
  <button class="btn-preview" onclick="postPreview()">预览</button>
  <button class="btn-apply"  onclick="postApply()">应用</button>
  <button class="btn-cancel" onclick="postCancel()">取消</button>
</div>

<script>
// ==================== Font fallback ====================
// Browsers don't support .ttc (TrueType Collection) via @font-face.
// Use system CJK fonts that match the TTC's style.
const FONT_CN = '"Noto Sans SC", "Microsoft YaHei", "PingFang SC", "Hiragino Sans GB", sans-serif';
let FONT_TIME = 'DSEG, monospace';
let _loadedTimeFont = 'DSEG7Modern-Bold.ttf';

// Try loading the DSEG TTF font (browsers support .ttf fine).
document.fonts.load('40px DSEG').catch(()=>{});

// Dynamically load a TTF font from /pic/ for preview
function loadTimeFont(fname) {
  if (fname === _loadedTimeFont) return;
  _loadedTimeFont = fname;
  // Remove old dynamic font style
  const old = document.getElementById('dyn-time-font');
  if (old) old.remove();
  // Create new @font-face
  const style = document.createElement('style');
  style.id = 'dyn-time-font';
  const fnameNoExt = fname.replace(/\.(ttf|ttc)$/i, '');
  style.textContent = `@font-face {
    font-family: 'DynTime';
    src: url('/pic/${encodeURIComponent(fname)}') format('truetype');
  }`;
  document.head.appendChild(style);
  FONT_TIME = `'DynTime', DSEG, monospace`;
  // Preload
  document.fonts.load(`40px ${FONT_TIME}`).then(() => {
    drawNow();
  }).catch(() => {});
}

// ==================== API ====================
let _host = () => document.getElementById('api-host').value || '192.168.2.103:8080';
let _original = {};
let _current  = {};
let _remote   = {};
let _arTimer = null;

function showErr(msg) {
  const el = document.getElementById('err-msg');
  if (msg) { el.textContent = msg; el.classList.add('show'); }
  else { el.classList.remove('show'); }
}

async function apiFetch(path, opts) {
  const url = `http://${_host()}${path}`;
  const res = await fetch(url, { signal: AbortSignal.timeout(5000), ...opts });
  if (!res.ok) throw new Error(`HTTP ${res.status}`);
  return res.json();
}

async function fetchLayout() {
  showErr('');
  setConn('loading');
  try {
    _remote = await apiFetch('/', {});
    _original = extractPos(_remote);
    _current  = { ..._original };
    updateUI();
    drawPreview();
    renderInfo();
    setPending(!!_remote.pending);
    setConn('on');
    loadFontList();  /* load available fonts for dropdowns */
  } catch(e) {
    setConn('off');
    showErr('连接失败: ' + e.message + '\n请确认树莓派 IP 和端口是否正确');
    console.error(e);
  }
}

async function loadFontList() {
  try {
    const fonts = await apiFetch('/fonts', {});
    populateFontSelect('f-font_cn', fonts, _current.font_cn);
    populateFontSelect('f-font_time', fonts, _current.font_time);
  } catch(e) { console.error('loadFontList:', e); }
}

function populateFontSelect(id, fonts, current) {
  const sel = document.getElementById(id);
  if (!sel) return;
  sel.innerHTML = '';
  fonts.forEach(f => {
    const opt = document.createElement('option');
    opt.value = f; opt.textContent = f;
    if (f === current) opt.selected = true;
    sel.appendChild(opt);
  });
}

async function uploadFont(file) {
  const st = document.getElementById('up-status');
  if (!file) return;
  // Client-side extension check
  const name = file.name.toLowerCase();
  if (!name.endsWith('.ttf') && !name.endsWith('.ttc')) {
    st.textContent = '只允许 .ttf / .ttc 文件'; st.className = 'upload-status err';
    return;
  }
  st.textContent = '上传中...'; st.className = 'upload-status';
  try {
    const url = `http://${_host()}/fonts/upload/${encodeURIComponent(file.name)}`;
    const res = await fetch(url, { method:'POST', body: file, signal: AbortSignal.timeout(30000) });
    if (!res.ok) {
      const err = await res.json().catch(()=>({error:'HTTP '+res.status}));
      throw new Error(err.error || 'HTTP '+res.status);
    }
    const data = await res.json();
    st.textContent = `✓ ${data.name} (${(data.size/1024).toFixed(1)} KB) 上传成功`; st.className = 'upload-status ok';
    // Refresh font list
    loadFontList();
    // Reset file input
    document.getElementById('upfile').value = '';
  } catch(e) {
    st.textContent = '上传失败: '+e.message; st.className = 'upload-status err';
  }
}

async function postPreview() {
  showErr('');
  const diff = getDiff();
  if (!Object.keys(diff).length) { showErr('没有修改'); return; }
  try {
    const data = await apiFetch('/layout', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify(diff)
    });
    _current = { ..._current, ...extractPos(data) };
    _remote = data;
    updateUI();
    setPending(true);
    drawPreview();
    renderInfo();
  } catch(e) { showErr('预览失败: '+e.message); }
}

async function postApply() {
  showErr('');
  try {
    const data = await apiFetch('/layout/apply', { method:'POST' });
    _original = extractPos(data); _current = { ..._original }; _remote = data;
    updateUI(); setPending(false); drawPreview(); renderInfo();
  } catch(e) { showErr('应用失败: '+e.message); }
}

async function postCancel() {
  showErr('');
  try {
    const data = await apiFetch('/layout/cancel', { method:'POST' });
    _original = extractPos(data); _current = { ..._original }; _remote = data;
    updateUI(); setPending(false); drawPreview(); renderInfo();
  } catch(e) { showErr('取消失败: '+e.message); }
}

// ==================== Utils ====================
function extractPos(json) {
  const p = {};
  p.time_x = json.time.x; p.time_y = json.time.y;
  p.date_x = json.date.x; p.date_y = json.date.y;
  p.w_label_x = _current.w_label_x ?? 150;
  ['w_label_y0','w_label_y1','w_label_y2','w_label_y3'].forEach((k,i)=>{ p[k] = _current[k] ?? (25+i*20); });
  p.w_data_x = json.weather.desc.x;
  ['w_data_y0','w_data_y1','w_data_y2','w_data_y3'].forEach((k,i)=>{
    p[k] = [json.weather.desc.y, json.weather.temp.y, json.weather.humidity.y, json.weather.city.y][i];
  });
  p.w_upd_x = json.weather.updated.x; p.w_upd_y = json.weather.updated.y;
  p.bat_x = json.battery.x; p.bat_y = json.battery.y;
  p.bat_frame_x = json.battery.frame.x; p.bat_frame_y = json.battery.frame.y;
  p.bat_frame_w = json.battery.frame.w; p.bat_frame_h = json.battery.frame.h;
  p.ip_x = json.ip.x; p.ip_y = json.ip.y;
  p.bar_y = json.bar.y; p.bar_h = json.bar.h;
  p.time_pt    = json.time.pt    ?? _current.time_pt    ?? 40;
  p.date_pt    = json.date.pt    ?? _current.date_pt    ?? 14;
  p.weather_pt = json.weather.pt ?? _current.weather_pt ?? 14;
  p.small_pt   = json.battery.pt ?? _current.small_pt   ?? 10;
  p.ip_pt      = json.ip.pt      ?? _current.ip_pt      ?? 13;
  p.font_cn    = json.font_cn    ?? _current.font_cn    ?? 'Font.ttc';
  p.font_time  = json.font_time  ?? _current.font_time  ?? 'DSEG7Modern-Bold.ttf';
  return p;
}

function getDiff() {
  const d = {};
  for (const [k,v] of Object.entries(_current)) { if (v !== _original[k]) d[k] = v; }
  return d;
}

function setConn(s) {
  const dot = document.getElementById('conn-dot');
  const badge = document.getElementById('conn-badge');
  dot.className = 'dot ' + (s==='on'?'on':s==='off'?'off':'');
  if (s==='on') { badge.textContent='已连接'; badge.className='badge active'; }
  else if (s==='off') { badge.textContent='断开'; badge.className='badge off'; }
  else { badge.textContent='...'; badge.className='badge off'; }
}

function setPending(v) {
  const b = document.getElementById('pending-badge');
  b.textContent = v ? '待应用' : '已应用';
  b.className = 'badge ' + (v?'pending':'active');
}

// ==================== UI ====================
// Simplified: position fields are draggable on preview; keep only size/config fields
const GROUPS = [
  { id:'bar', name:'底栏', fields:[{k:'bar_y',l:'Y'},{k:'bar_h',l:'H'}] },
  { id:'font', name:'字号 (pt)', fields:[
    {k:'time_pt',l:'时间'},{k:'date_pt',l:'日期'},
    {k:'weather_pt',l:'天气'},{k:'small_pt',l:'电池'},
    {k:'ip_pt',l:'IP/更新'},
  ]},
  { id:'fontsel', name:'字体文件', fields:[
    {k:'font_cn',l:'中文字体', type:'select'},
    {k:'font_time',l:'时间字体', type:'select'},
  ]},
];

function buildControls() {
  document.getElementById('controls').innerHTML = GROUPS.map(g =>
    `<div class="group open" id="group-${g.id}">
      <div class="group-head" onclick="document.getElementById('group-${g.id}').classList.toggle('open')">
        <h3>${g.name}</h3><span class="icon">&#9660;</span>
      </div>
      <div class="group-body">${g.fields.map(f => {
        if (f.type === 'select') {
          return `<div class="field"><label>${f.l}</label>
            <select id="f-${f.k}" data-key="${f.k}" onchange="if(!_updating){onFieldChange(this);drawNow()}">
              <option value="">--</option>
            </select>
          </div>`;
        }
        return `<div class="field"><label>${f.l}</label>
          <input id="f-${f.k}" type="number" data-key="${f.k}" oninput="if(!_updating){onFieldChange(this);drawNow()}" onfocus="this.select()">
        </div>`;
      }).join('')}
      </div>
    </div>`).join('');
  // Append upload zone after controls
  document.getElementById('controls').insertAdjacentHTML('beforeend', `
    <div class="group open" id="group-upload">
      <div class="group-head" onclick="document.getElementById('group-upload').classList.toggle('open')">
        <h3>上传字体</h3><span class="icon">&#9660;</span>
      </div>
      <div class="group-body" style="display:block">
        <div class="upload-zone" id="upload-zone" onclick="document.getElementById('upfile').click()">
          <div class="up-icon">&#128194;</div>
          <div class="up-text">点击或拖放 .ttf / .ttc 文件到这里</div>
          <input type="file" id="upfile" accept=".ttf,.ttc" onchange="uploadFont(this.files[0])">
        </div>
        <div class="upload-status" id="up-status"></div>
      </div>
    </div>
  `);
  // Drag & drop
  const zone = document.getElementById('upload-zone');
  zone.addEventListener('dragover', e => { e.preventDefault(); zone.classList.add('dragover'); });
  zone.addEventListener('dragleave', () => zone.classList.remove('dragover'));
  zone.addEventListener('drop', e => {
    e.preventDefault(); zone.classList.remove('dragover');
    const f = e.dataTransfer.files[0];
    if (f) uploadFont(f);
  });
}

function onFieldChange(inp) {
  const k = inp.dataset.key, v = inp.type === 'select-one' ? inp.value : parseInt(inp.value);
  if (inp.type !== 'select-one' && isNaN(v)) return;
  _current[k] = v;
  inp.classList.toggle('modified', v !== _original[k]);
  if (k === 'font_time') loadTimeFont(v);
}

function updateUI() {
  _updating = true;
  for (const [k,v] of Object.entries(_current)) {
    const inp = document.getElementById('f-'+k);
    if (!inp) continue;
    if (inp.type === 'select-one') {
      inp.value = v;
    } else {
      inp.value = v;
    }
    inp.classList.toggle('modified', v !== _original[k]);
    if (k === 'font_time' && v) loadTimeFont(v);
  }
  _updating = false;
}

// ==================== Drag layer ====================
const DRAG_HANDLES = [
  { k:'time_x',ky:'time_y', label:'时间', fn:'time' },
  { k:'date_x',ky:'date_y', label:'日期', fn:'date' },
  { k:'w_label_x',ky:'w_label_y0', label:'标签1', fn:'wlabel' },
  { k:'w_label_x',ky:'w_label_y1', label:'标签2', fn:'wlabel' },
  { k:'w_label_x',ky:'w_label_y2', label:'标签3', fn:'wlabel' },
  { k:'w_label_x',ky:'w_label_y3', label:'标签4', fn:'wlabel' },
  { k:'w_data_x',ky:'w_data_y0', label:'数据1', fn:'wdata' },
  { k:'w_data_x',ky:'w_data_y1', label:'数据2', fn:'wdata' },
  { k:'w_data_x',ky:'w_data_y2', label:'数据3', fn:'wdata' },
  { k:'w_data_x',ky:'w_data_y3', label:'数据4', fn:'wdata' },
  { k:'w_upd_x',ky:'w_upd_y', label:'更新', fn:'wupd' },
  { k:'bat_x',ky:'bat_y', label:'电量%', fn:'bat' },
  { k:'bat_frame_x',ky:'bat_frame_y', label:'框', fn:'batf' },
  { k:'ip_x',ky:'ip_y', label:'IP', fn:'ip' },
];
let _dragIdx = -1, _dragOffX = 0, _dragOffY = 0, _hoverIdx = -1;

function getHandleSize(h) {
  const W = 250;
  const fn = h.fn;
  const c = document.getElementById('preview');
  const ctx = c.getContext('2d');
  ctx.textBaseline = 'alphabetic';
  ctx.font = `${_current.time_pt ?? 40}px ${FONT_TIME}`;
  if (fn === 'time') { const m = ctx.measureText('88:88'); return {w: Math.ceil(m.width) + 4, h: _current.time_pt ?? 40}; }
  ctx.font = `${_current.date_pt ?? 14}px ${FONT_CN}`;
  if (fn === 'date') { const m = ctx.measureText(_remote?.date?.text || '0000年00月00日'); return {w: Math.ceil(m.width) + 4, h: _current.date_pt ?? 14}; }
  ctx.font = `${_current.weather_pt ?? 14}px ${FONT_CN}`;
  if (fn === 'wlabel') { const m = ctx.measureText('天气:'); return {w: Math.ceil(m.width) + 4, h: _current.weather_pt ?? 14}; }
  if (fn === 'wdata') { const m = ctx.measureText(_remote?.weather?.desc?.text || '晴'); return {w: Math.ceil(m.width) + 4, h: _current.weather_pt ?? 14}; }
  ctx.font = `${_current.ip_pt ?? 13}px ${FONT_CN}`;
  if (fn === 'wupd') { const m = ctx.measureText(_remote?.weather?.updated?.text || '07/18 12:00'); return {w: Math.ceil(m.width) + 2, h: _current.ip_pt ?? 13}; }
  if (fn === 'ip') { const m = ctx.measureText(_remote?.ip?.text ? 'IP:'+_remote.ip.text : 'IP:192.168.2.103'); return {w: Math.ceil(m.width) + 2, h: _current.ip_pt ?? 13}; }
  ctx.font = `${_current.small_pt ?? 10}px ${FONT_CN}`;
  if (fn === 'bat') { const m = ctx.measureText(_remote?.battery?.text || '100%'); return {w: Math.ceil(m.width) + 2, h: _current.small_pt ?? 10}; }
  if (fn === 'batf') return {w: _current.bat_frame_w ?? 29, h: _current.bat_frame_h ?? 11};
  return {w: 20, h: 14};
}

function drawHandles() {
  const c = document.getElementById('drag-layer');
  if (!c) return;
  const ctx = c.getContext('2d');
  ctx.clearRect(0, 0, 250, 122);
  if (!_current || !Object.keys(_current).length) return;
  // Only show hover highlight (subtle outline)
  if (_hoverIdx >= 0) {
    const h = DRAG_HANDLES[_hoverIdx];
    const x = _current[h.k] ?? 0;
    const y = _current[h.ky] ?? 0;
    const s = getHandleSize(h);
    ctx.strokeStyle = '#e94560';
    ctx.lineWidth = 1;
    ctx.setLineDash([3, 3]);
    ctx.strokeRect(x + 0.5, y + 0.5, s.w, s.h);
    ctx.setLineDash([]);
    // Label with coordinates
    ctx.fillStyle = '#e94560';
    ctx.font = 'bold 9px monospace';
    const tx = _current[h.k] ?? 0, ty = _current[h.ky] ?? 0;
    ctx.fillText(`${h.label} (${tx}, ${ty})`, x, y - 2);
  }
}

function getHandleAt(mx, my) {
  for (let i = DRAG_HANDLES.length - 1; i >= 0; i--) {
    const h = DRAG_HANDLES[i];
    const x = _current[h.k] ?? 0, y = _current[h.ky] ?? 0;
    const s = getHandleSize(h);
    if (mx >= x && mx <= x + s.w && my >= y && my <= y + s.h) return i;
  }
  return -1;
}

function setupDragLayer() {
  const c = document.getElementById('drag-layer');
  if (!c) return;

  const getPos = e => {
    const r = c.getBoundingClientRect();
    const s = r.width / 250;  // canvas display width / internal width
    return { x: (e.clientX - r.left) / s, y: (e.clientY - r.top) / s };
  };

  const onDown = e => {
    const {x, y} = getPos(e);
    _dragIdx = getHandleAt(x, y);
    if (_dragIdx >= 0) {
      const h = DRAG_HANDLES[_dragIdx];
      _dragOffX = Math.round(x) - (_current[h.k] ?? 0);
      _dragOffY = Math.round(y) - (_current[h.ky] ?? 0);
      c.style.cursor = 'grabbing';
      e.preventDefault();
    }
  };

  const onMove = e => {
    const {x, y} = getPos(e);
    if (_dragIdx < 0) {
      _hoverIdx = getHandleAt(x, y);
      c.style.cursor = _hoverIdx >= 0 ? 'grab' : 'crosshair';
      drawHandles();
      return;
    }
    const h = DRAG_HANDLES[_dragIdx];
    const s = getHandleSize(h);
    const nx = Math.max(0, Math.min(250 - s.w, Math.round(x) - _dragOffX));
    const ny = Math.max(0, Math.min(122 - s.h, Math.round(y) - _dragOffY));
    _current[h.k] = nx;
    _current[h.ky] = ny;
    // Sync label cols: w_label_x / w_data_x
    if (h.k === 'w_label_x') {
      for (let i = 0; i < 4; i++) _current['w_label_y'+i] = ny + i * 20;
    }
    if (h.k === 'w_data_x') {
      for (let i = 0; i < 4; i++) _current['w_data_y'+i] = ny + i * 20;
    }
    drawHandles();
    drawNow();
    updateUI();
    e.preventDefault();
  };

  const onUp = () => {
    const wasDragging = _dragIdx >= 0;
    _dragIdx = -1; _hoverIdx = -1;
    c.style.cursor = 'crosshair';
    drawHandles();
    if (wasDragging) postPreview();  // auto-preview on drag end
  };

  c.addEventListener('mousedown', onDown);
  c.addEventListener('mousemove', onMove);
  c.addEventListener('mouseup', onUp);
  c.addEventListener('mouseleave', onUp);
  // Touch
  c.addEventListener('touchstart', e => {
    const t = e.touches[0];
    onDown({clientX: t.clientX, clientY: t.clientY, preventDefault: ()=>e.preventDefault()});
  }, {passive: false});
  c.addEventListener('touchmove', e => {
    const t = e.touches[0];
    onMove({clientX: t.clientX, clientY: t.clientY, preventDefault: ()=>e.preventDefault()});
  }, {passive: false});
  c.addEventListener('touchend', onUp);
}

// ==================== Preview ====================
let _updating = false;

function updatePositionDisplay() {
  const tbody = document.querySelector('#pos-table tbody');
  if (!tbody || !_current || !Object.keys(_current).length) return;
  // Deduplicate: group handles sharing same X key
  const seen = {};
  const rows = [];
  DRAG_HANDLES.forEach(h => {
    if (seen[h.k]) return;
    seen[h.k] = true;
    const x = _current[h.k] ?? 0, y = _current[h.ky] ?? 0;
    const xMod = _original[h.k] !== undefined && x !== _original[h.k];
    const yMod = _original[h.ky] !== undefined && y !== _original[h.ky];
    rows.push(`<tr><td>${h.label}</td><td class="${xMod?'mod':''}">${x}</td><td class="${yMod?'mod':''}">${y}</td></tr>`);
  });
  // Also bar
  if (_current.bar_y !== undefined) {
    rows.push(`<tr><td>底栏Y</td><td>--</td><td>${_current.bar_y}</td></tr>`);
    rows.push(`<tr><td>底栏H</td><td>--</td><td>${_current.bar_h}</td></tr>`);
  }
  tbody.innerHTML = rows.join('');
}

function drawNow() {
  if (!_remote || !Object.keys(_remote).length) return;
  const prev = JSON.parse(JSON.stringify(_remote));
  const c = _current;
  prev.time.x = c.time_x; prev.time.y = c.time_y;
  prev.date.x = c.date_x; prev.date.y = c.date_y;
  prev.battery.x = c.bat_x; prev.battery.y = c.bat_y;
  prev.battery.frame.x = c.bat_frame_x; prev.battery.frame.y = c.bat_frame_y;
  prev.battery.frame.w = c.bat_frame_w; prev.battery.frame.h = c.bat_frame_h;
  prev.ip.x = c.ip_x; prev.ip.y = c.ip_y;
  prev.bar.y = c.bar_y; prev.bar.h = c.bar_h;
  if (prev.weather) {
    prev.weather.desc.x = c.w_data_x;     prev.weather.desc.y = c.w_data_y0;
    prev.weather.temp.x = c.w_data_x;     prev.weather.temp.y = c.w_data_y1;
    prev.weather.humidity.x = c.w_data_x; prev.weather.humidity.y = c.w_data_y2;
    prev.weather.city.x = c.w_data_x;     prev.weather.city.y = c.w_data_y3;
    prev.weather.updated.x = c.w_upd_x;   prev.weather.updated.y = c.w_upd_y;
  }
  drawPreview(prev);
}

function drawPreview(data) {
  try { _draw(data); drawHandles(); updatePositionDisplay(); } catch(e) { console.error('drawPreview error:', e); }
}

function _draw(data) {
  if (!data) data = _remote;
  if (!data || !Object.keys(data).length) return;

  const W = 250, H = 122;
  const c = document.getElementById('preview');
  const ctx = c.getContext('2d');
  ctx.fillStyle = '#fff'; ctx.fillRect(0, 0, W, H);

  ctx.textBaseline = 'alphabetic';

  function ascent(sz, fam) {
    ctx.font = `${sz}px ${fam}`;
    if (fam.includes('DSEG')) {
      const m = ctx.measureText('0');
      return m.actualBoundingBoxAscent || sz * 0.72;
    }
    // CJK: actualBoundingBoxAscent ≈ full em, but stb_truetype uses
    // OS/2 sTypoAscender (~0.88× em).  Scale down to match.
    const m = ctx.measureText('\u56FD');
    const raw = m.actualBoundingBoxAscent;
    return raw ? raw * 0.88 : sz * 0.78;
  }
  function text(s, x, y, sz, fam) {
    ctx.font = `${sz}px ${fam}`;
    ctx.fillText(s, x, y + ascent(sz, fam));
  }

  // Bottom bar — use pure black for clean threshold
  const barY = data.bar?.y ?? 105, barH = data.bar?.h ?? 17;
  ctx.fillStyle = '#000'; ctx.fillRect(0, barY, W, barH);

  // Time
  ctx.fillStyle = '#000';
  text(data.time.text, data.time.x, data.time.y, _current.time_pt ?? 40, FONT_TIME);

  // Date
  text(data.date.text, data.date.x, data.date.y, _current.date_pt ?? 14, FONT_CN);

  // Weather
  const w = data.weather;
  if (w) {
    ctx.fillStyle = '#000';  /* pure black for crisp threshold */
    const wp = _current.weather_pt ?? 14;
    const labels = w.labels || ['天气:','温度:','湿度:','城市:'];
    const lx = _current.w_label_x ?? 150, dx = _current.w_data_x ?? 195;
    [
      [labels[0], w.desc.text],
      [labels[1], w.temp.text],
      [labels[2], w.humidity.text],
      [labels[3], w.city.text],
    ].forEach(([lb, val], i) => {
      text(lb, lx, _current['w_label_y'+i] ?? (25+i*20), wp, FONT_CN);
      text(val, dx, _current['w_data_y'+i] ?? (25+i*20), wp, FONT_CN);
    });

    const ip = _current.ip_pt ?? 13;
    ctx.fillStyle = '#ccc';  /* brighter on black bar */
    text(w.updated.text, w.updated.x, w.updated.y, ip, FONT_CN);
  }

  // Battery in bar
  const b = data.battery;
  ctx.fillStyle = '#fff';
  ctx.strokeStyle = '#fff'; ctx.lineWidth = 1;
  text(b.text, b.x, b.y, _current.small_pt ?? 10, FONT_CN);
  // Snap stroke to pixel grid for crisp 1px lines
  ctx.strokeRect(b.frame.x + 0.5, b.frame.y + 0.5, b.frame.w, b.frame.h);
  ctx.fillRect(b.frame.x+b.frame.w, b.frame.y+3, 3, 3);
  ctx.fillRect(b.frame.x+b.frame.w, b.frame.y+7, 3, 3);

  // Lightning bolt icon (matching clock.c draw_bottom_edge)
  // White filled ellipse, then black lines cut through to form bolt shape
  const lx = 199, ly = b.frame.y;  // hardcoded X in C; Y relative to frame
  ctx.fillStyle = '#fff';
  ctx.beginPath();
  ctx.ellipse(lx + 0.5, ly + 5 + 0.5, 7, 6, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.strokeStyle = '#000'; ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(lx + 0.5, ly + 1); ctx.lineTo(lx + 0.5, ly + 6);
  ctx.moveTo(200 + 0.5, ly + 6); ctx.lineTo(204 + 0.5, ly + 6);
  ctx.stroke();
  ctx.strokeStyle = '#fff';  // restore for IP text below

  // IP in bar
  text('IP:'+data.ip.text, data.ip.x, data.ip.y, _current.ip_pt ?? 13, FONT_CN);

  // Atkinson dithering — preserves detail for 1-bit text edges
  // Classic Macintosh algorithm: distributes 6/8 error, drops 2/8
  const img = ctx.getImageData(0, 0, W, H);
  const d = img.data;
  for (let y = 0; y < H; y++) {
    for (let x = 0; x < W; x++) {
      const idx = (y * W + x) * 4;
      const old = d[idx];  // R channel (R=G=B for grayscale)
      const newVal = old > 127 ? 255 : 0;
      const err = (old - newVal) >> 3;  // error / 8
      d[idx] = d[idx+1] = d[idx+2] = newVal;
      if (err === 0) continue;
      // Atkinson pattern: 1/8 to each of 6 neighbors
      const add = (ox, oy) => {
        const i = ((y+oy) * W + (x+ox)) * 4;
        d[i] = Math.min(255, Math.max(0, d[i] + err));
        d[i+1] = Math.min(255, Math.max(0, d[i+1] + err));
        d[i+2] = Math.min(255, Math.max(0, d[i+2] + err));
      };
      if (x + 1 < W) add(1, 0);
      if (x + 2 < W) add(2, 0);
      if (y + 1 < H) {
        if (x - 1 >= 0) add(-1, 1);
        add(0, 1);
        if (x + 1 < W) add(1, 1);
      }
      if (y + 2 < H) add(0, 2);
    }
  }
  ctx.putImageData(img, 0, 0);
}

function renderInfo() {
  const data = _remote;
  if (!data || !Object.keys(data).length) return;
  document.getElementById('info').innerHTML = [
    ['时间', data.time.text], ['日期', data.date.text],
    ['天气', data.weather.desc.text], ['温度', data.weather.temp.text],
    ['湿度', data.weather.humidity.text], ['城市', data.weather.city.text],
    ['电量', data.battery.text], ['IP', data.ip.text],
    ['更新', data.weather.updated.text],
  ].map(([k,v]) => `<div class="row"><span>${k}</span><span>${v}</span></div>`).join('');
}

// ==================== Init ====================
document.getElementById('api-host').addEventListener('change', fetchLayout);
buildControls();
setupDragLayer();
fetchLayout();

function toggleAutoRefresh() {
  const cb = document.getElementById('ar-toggle');
  if (cb.checked) startAutoRefresh();
  else stopAutoRefresh();
}

function changeInterval() {
  if (document.getElementById('ar-toggle').checked) {
    stopAutoRefresh(); startAutoRefresh();
  }
}

function startAutoRefresh() {
  stopAutoRefresh();
  const sec = parseInt(document.getElementById('ar-interval').value) || 30;
  _arTimer = setInterval(() => {
    if (_host()) fetchLayout().catch(()=>{});
  }, sec * 1000);
  document.getElementById('ar-label').style.color = 'var(--ok)';
}

function stopAutoRefresh() {
  if (_arTimer) { clearInterval(_arTimer); _arTimer = null; }
  document.getElementById('ar-label').style.color = 'var(--muted)';
}
</script>
